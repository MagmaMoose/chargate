# Chargate pre-commit hook — the fast, local first line.
#
# Add to a consumer .pre-commit-config.yaml:
#
#   repos:
#     - repo: https://github.com/MagmaMoose/chargate
#       rev: v2.0.0            # pin to a tag/SHA
#       hooks:
#         - id: chargate
#
# language: python — pre-commit builds an isolated venv and installs the chargate
# CLI from this repo (no Docker required locally). It runs a FAST staged-file
# subset (gitleaks for secrets, ruff for Python — each skipped if not installed),
# NOT the full MegaLinter net. CI is the authoritative broad scan; this is the
# fast first line. Local/CI disparity is intended.
- id: chargate
  name: Chargate (fast staged-file security + lint)
  description: Fast first-line security/lint checks on staged files.
  entry: chargate local
  language: python
  pass_filenames: true
  require_serial: true
  stages: [pre-commit]

# File-hygiene / repo-policy hooks (bash, no Docker). These are the "keepers"
# consolidated from the older CalebSargeant/pre-commit-hooks library — the
# formatting / Actions-SHA-pinning / branch-naming first line that coexists with
# the security `chargate` hook above.
- id: actions-pin-sha
  name: GitHub Actions SHA pinning
  description: >-
    Pin `uses: owner/repo@ref` to a full commit SHA and annotate with the
    resolved semver tag; falls back to the latest matching tag when a ref cannot
    be resolved. Auto-fixes and re-stages, so the first run fails — re-commit to
    proceed (standard pre-commit auto-fixer behaviour).
  entry: hooks/github-actions-pin-sha.sh
  language: script
  files: '^\.github/workflows/.*\.ya?ml$'
  stages: [pre-commit]
  require_serial: true

- id: conventional-branch-name
  name: Enforce conventional branch naming
  description: >-
    Block pushes from branches not matching `<type>/<description>` (allowed
    types: feat, fix, docs, style, refactor, perf, test, build, ci, chore,
    revert; main/master/develop and dependabot/renovate branches are exempt).
  entry: hooks/enforce-conventional-branch-name.sh
  language: script
  pass_filenames: false
  always_run: true
  stages: [pre-push]
