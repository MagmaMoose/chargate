# Chargate pre-commit hooks — the SAME scanners chargate runs in CI, available
# locally on `git commit` / `git push`. Tools auto-detect and skip if they're not
# installed, so a missing scanner never blocks your commit (CI still enforces it).
#
# Fast, file-scoped linters run at pre-commit; slower whole-tree security scans
# run at pre-push. Override `stages:` in your .pre-commit-config.yaml to taste.

# ── Lint · fast · pre-commit ──────────────────────────────────────────────────
- id: shellcheck
  name: 'Chargate · ShellCheck'
  description: Lint shell scripts.
  entry: scripts/lint-shellcheck.sh
  language: script
  files: '\.(sh|bash|zsh)$'
  stages: [pre-commit]

- id: actionlint
  name: 'Chargate · actionlint'
  description: Lint GitHub Actions workflows.
  entry: scripts/lint-actionlint.sh
  language: script
  files: '^\.github/workflows/.*\.ya?ml$'
  stages: [pre-commit]

- id: hadolint
  name: 'Chargate · Hadolint'
  description: Lint Dockerfiles.
  entry: scripts/lint-hadolint.sh
  language: script
  files: '(^|/)Dockerfile($|\.)|\.dockerfile$'
  stages: [pre-commit]

- id: eslint
  name: 'Chargate · ESLint'
  description: Run the project's npm lint script.
  entry: scripts/lint-eslint.sh
  language: script
  files: '\.(jsx?|tsx?|mjs|cjs)$'
  pass_filenames: false
  stages: [pre-commit]

# ── Lint · slower · pre-push ──────────────────────────────────────────────────
- id: kustomize
  name: 'Chargate · Kustomize validate'
  description: Build + validate Kubernetes manifests (kubeconform / kube-score).
  entry: scripts/lint-kustomize.sh
  language: script
  files: '(^|/)(k8s|kubernetes|kustomize)/|kustomization\.ya?ml$'
  pass_filenames: false
  stages: [pre-push]

# ── Security · whole-tree · pre-push ──────────────────────────────────────────
- id: trivy
  name: 'Chargate · Trivy vulnerabilities'
  description: Filesystem dependency vulnerability scan.
  entry: scripts/security-trivy-vuln.sh
  language: script
  pass_filenames: false
  always_run: true
  require_serial: true
  stages: [pre-push]

- id: trufflehog
  name: 'Chargate · TruffleHog secrets'
  description: Verified-secret detection.
  entry: scripts/security-trufflehog.sh
  language: script
  pass_filenames: false
  always_run: true
  require_serial: true
  stages: [pre-push]

- id: semgrep
  name: 'Chargate · Semgrep SAST'
  description: Static analysis security scan.
  entry: scripts/security-semgrep.sh
  language: script
  pass_filenames: false
  always_run: true
  require_serial: true
  stages: [pre-push]

- id: pip-audit
  name: 'Chargate · pip-audit'
  description: Python dependency vulnerabilities.
  entry: scripts/security-pip-audit.sh
  language: script
  files: '(^|/)requirements.*\.txt$|(^|/)pyproject\.toml$'
  pass_filenames: false
  stages: [pre-push]

- id: npm-audit
  name: 'Chargate · npm/yarn/pnpm audit'
  description: JavaScript dependency vulnerabilities.
  entry: scripts/security-npm-audit.sh
  language: script
  files: '(^|/)(package-lock\.json|yarn\.lock|pnpm-lock\.yaml)$'
  pass_filenames: false
  stages: [pre-push]

- id: govulncheck
  name: 'Chargate · govulncheck'
  description: Go vulnerability scan.
  entry: scripts/security-govulncheck.sh
  language: script
  files: '\.go$|(^|/)go\.(mod|sum)$'
  pass_filenames: false
  stages: [pre-push]

- id: checkov
  name: 'Chargate · Checkov (IaC)'
  description: Terraform / Kubernetes / Dockerfile policy scan.
  entry: scripts/security-checkov.sh
  language: script
  files: '\.(tf|tfvars|hcl)$|(^|/)(k8s|kubernetes|kustomize|helm)/|(^|/)Dockerfile($|\.)'
  stages: [pre-push]
