# Call cinnabar as a reusable workflow — an isolated job with permissions baked
# in, ideal as a standalone required status check.
name: Security & Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  cinnabar:
    uses: magmamoose/cinnabar/.github/workflows/cinnabar.yaml@v1
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    with:
      security_fail: true
      lint_fail: false
      enable_sarif_upload: false
