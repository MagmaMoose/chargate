# Drop the cinnabar composite action into a PR workflow.
# The action checks out your code itself (checkout: true by default).
name: Security & Lint

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write   # for SARIF upload (needs GitHub Advanced Security on private repos)

jobs:
  cinnabar:
    runs-on: ubuntu-latest
    steps:
      - uses: magmamoose/cinnabar@v1
        with:
          # security blocks by default; lint is advisory by default
          lint_fail: false
          # set true once GitHub Advanced Security is enabled on the repo
          enable_sarif_upload: false
          # optional: skip noisy IaC checks
          # checkov_skip_checks: 'CKV_DOCKER_2,CKV_K8S_21'
