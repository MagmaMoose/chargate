# Chargate GitHub App — scan engine.
#
# Fired by repository_dispatch from the Chargate backend (app/api) when a PR opens
# or updates in an installed repo. Runs the published Chargate action against the
# target repo and POSTs the SARIF back to the backend, which stores the findings
# and completes the Check Run.
#
# This workflow holds NO standing credentials. The backend passes, per scan:
#   • repo_token   — a read-only token scoped to just the target repo (checkout)
#   • ingest_token — a one-time bearer to POST results for this scan only
# Both are short-lived and never logged.
name: Chargate App Scan

on:
  repository_dispatch:
    types: [chargate-scan]

permissions: {}

concurrency:
  group: chargate-${{ github.event.client_payload.full_name }}-${{ github.event.client_payload.head_sha }}
  cancel-in-progress: true

jobs:
  scan:
    name: Scan ${{ github.event.client_payload.full_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FULL_NAME: ${{ github.event.client_payload.full_name }}
      HEAD_SHA: ${{ github.event.client_payload.head_sha }}
    steps:
      - name: Checkout target repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: ${{ github.event.client_payload.full_name }}
          ref: ${{ github.event.client_payload.head_sha }}
          token: ${{ github.event.client_payload.repo_token }}
          fetch-depth: 0
          persist-credentials: false

      # Scans the checked-out target at the workspace root. enable_dashboard:true so
      # the action still emits SARIF (→ CHARGATE_SARIF_DIR); we never block here —
      # the backend decides the check conclusion from the stored findings.
      - name: Run Chargate
        id: scan
        continue-on-error: true
        uses: magmamoose/chargate@v1
        with:
          checkout: false
          security_fail: false
          lint_fail: false
          enable_sarif_upload: false
          enable_dashboard: true

      - name: Post results to Chargate backend
        env:
          INGEST_URL: ${{ github.event.client_payload.ingest_url }}
          INGEST_TOKEN: ${{ github.event.client_payload.ingest_token }}
          SEC: ${{ steps.scan.outputs.security_result }}
          LINT: ${{ steps.scan.outputs.lint_result }}
        run: |
          python3 - <<'PY'
          import glob, json, os, urllib.request
          d = os.environ.get("CHARGATE_SARIF_DIR") or f"{os.environ['RUNNER_TEMP']}/chargate-sarif"
          docs = []
          for p in sorted(glob.glob(f"{d}/*.sarif")):
              try:
                  with open(p) as fh:
                      docs.append(json.load(fh))
              except Exception as exc:  # noqa: BLE001
                  print(f"skip {p}: {exc}")
          body = json.dumps({
              "security_result": os.environ.get("SEC") or None,
              "lint_result": os.environ.get("LINT") or None,
              "sarif": docs,
          }).encode()
          req = urllib.request.Request(
              os.environ["INGEST_URL"], data=body, method="POST",
              headers={"Content-Type": "application/json",
                       "Authorization": "Bearer " + os.environ["INGEST_TOKEN"]})
          with urllib.request.urlopen(req, timeout=60) as r:  # noqa: S310 — backend URL from trusted dispatch
              print("ingest:", r.status, r.read(300).decode())
          PY
