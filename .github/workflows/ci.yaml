name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  self-scan:
    name: Self-scan (dogfood)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
      # Chargate scans chargate: ShellCheck over scripts/, actionlint over the
      # workflows, Trivy/TruffleHog/Semgrep over the tree.
      # Both gates on: chargate must pass its own security + lint scan.
      - name: Run chargate on chargate
        uses: ./
        with:
          checkout: false
          lint_fail: true
          security_fail: true
          enable_sarif_upload: false

  validate:
    name: Validate action metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      - name: action.yml + hook manifest parse
        shell: bash
        run: |
          python3 -c "import yaml; yaml.safe_load(open('action.yml')); print('action.yml ok')"
          python3 -c "import yaml; yaml.safe_load(open('.pre-commit-hooks.yaml')); print('.pre-commit-hooks.yaml ok')"
      - name: scripts are executable
        shell: bash
        run: |
          miss=0
          for f in scripts/*.sh scripts/lib/*.sh; do
            [ -x "$f" ] || { echo "not executable: $f"; miss=1; }
          done
          [ "$miss" = 0 ] && echo "all scripts executable"
          exit "$miss"
      - name: dashboard renderer
        shell: bash
        run: |
          out="$RUNNER_TEMP/dash/index.html"
          python3 scripts/render-dashboard.py \
            --sarif-dir tests/fixtures/dashboard --out "$out" \
            --repo magmamoose/chargate --ref main --sha 0123456789abcdef0123456789abcdef01234567
          # Findings rendered, severities bucketed, and scanner text is escaped (no XSS).
          grep -q 'CVE-2023-0001' "$out"
          grep -q 'sev critical' "$out"
          grep -q 'sev low' "$out"
          grep -q 'sev high' "$out"
          ! grep -q '<script>alert' "$out"
          # Empty input still produces a valid, self-explaining page (exit 0).
          python3 scripts/render-dashboard.py --sarif-dir "$RUNNER_TEMP/none" --out "$RUNNER_TEMP/empty.html"
          grep -q 'No findings' "$RUNNER_TEMP/empty.html"
          echo "dashboard renderer ok"
