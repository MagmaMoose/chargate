name: Security

# Chargate eats its own dog food by consuming the LOCAL composite action
# (./action.yml at THIS commit) — the same thing an external repo gets from
#   uses: magmamoose/chargate@v2
# so every run exercises the action under test. The only extra line vs. an
# external consumer is the checkout: a local `uses: ./` needs the repo present
# first, whereas `magmamoose/chargate@v2` checks the consumer out itself.
#
# Each sink is active iff its host URL is set — no separate on/off toggle. With
# product / engagement / project all defaulting to the repo, a consumer wiring a
# sink supplies only the URL + credential (the MM_* names are this repo's vars).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write     # Chargate posts net-new findings as PR comments
  security-events: write   # full SARIF -> GitHub Security tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chargate:
    runs-on: ubuntu-latest
    steps:
      # Local `uses: ./` needs action.yml present; net-new needs full history.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./
        with:
          checkout: 'false'   # already checked out above with full history
          # DefectDojo — full-SARIF sink. product / product_type / engagement
          # default to the repo name / "Research and Development" / "ci".
          defectdojo_url: ${{ vars.MM_DEFECTDOJO_URL }}
          defectdojo_token: ${{ secrets.MM_DEFECTDOJO_API_KEY }}
          # Dependency-Track — CycloneDX BOM sink. project name/version default to
          # the repo and ref.
          dependency_track_url: ${{ vars.MM_DEPENDENCYTRACK_URL }}
          dependency_track_api_key: ${{ secrets.MM_DEPENDENCYTRACK_API_KEY }}
