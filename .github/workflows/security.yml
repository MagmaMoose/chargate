name: Security

# Chargate/KICS suppression (reviewed false positive, not a vulnerability):
#   baee238e... Passwords And Secrets - Generic Token misfires on the required
#   `id-token: write` GitHub OIDC permission key below — no secret is present.
# kics-scan disable=baee238e-1921-4801-9c3f-79ae1d7b2cbc
#
# Chargate eats its own dog food by consuming the LOCAL composite action
# (./action.yml at THIS commit) — the same thing an external repo gets from
#   uses: magmamoose/chargate@v2
# so every run exercises the action under test. The only extra line vs. an
# external consumer is the checkout: a local `uses: ./` needs the repo present
# first, whereas `magmamoose/chargate@v2` checks the consumer out itself.
#
# Each sink is active iff its host URL is set — no separate on/off toggle. With
# product / engagement / project all defaulting to the repo, a consumer wiring a
# sink supplies only the URL + credential (the MM_* names are this repo's vars).

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write     # Chargate posts net-new findings as PR comments
  security-events: write   # full SARIF -> GitHub Security tab
  # kics-scan ignore-line
  id-token: write          # OIDC exchange at the broker -> comment as Chargate[bot]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chargate:
    runs-on: ubuntu-latest
    steps:
      # Local `uses: ./` needs action.yml present; net-new needs full history.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # Mint a token from the "Chargate" GitHub App so PR comments are authored by
      # Chargate[bot] (not github-actions[bot]). Skipped when the app isn't
      # configured, in which case pr_comment_token is empty and the action falls
      # back to GITHUB_TOKEN. The app only needs Pull requests: write.
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        if: ${{ vars.MM_CHARGATE_APP_ID != '' }}
        with:
          app-id: ${{ vars.MM_CHARGATE_APP_ID }}
          private-key: ${{ secrets.MM_CHARGATE_APP_PRIVATE_KEY }}
      - uses: ./
        with:
          checkout: 'false'   # already checked out above with full history
          # Author PR comments as Chargate[bot] when the app is configured; the
          # Security-tab upload keeps using the default github_token.
          pr_comment_token: ${{ steps.app-token.outputs.token }}
          # DefectDojo — full-SARIF sink. product / product_type / engagement
          # default to the repo name / "Research and Development" / "ci".
          defectdojo_url: ${{ vars.MM_DEFECTDOJO_URL }}
          defectdojo_token: ${{ secrets.MM_DEFECTDOJO_API_KEY }}
          # Dependency-Track — CycloneDX BOM sink. project name/version default to
          # the repo and ref.
          dependency_track_url: ${{ vars.MM_DEPENDENCYTRACK_URL }}
          dependency_track_api_key: ${{ secrets.MM_DEPENDENCYTRACK_API_KEY }}
