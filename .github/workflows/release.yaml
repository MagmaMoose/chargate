name: Release

# Push to main (or manual / triggered by the tool-update workflow):
#   gate  → install every pinned scanner, smoke-test each runs, strict self-scan
#   release (needs gate) → semantic-release cuts vX.Y.Z + a GitHub Release (which
#           updates the Marketplace listing) and moves the floating v1 tag.
# A failing gate blocks the release, so a breaking upstream tool change can never
# publish.

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - 'examples/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chargate-release
  cancel-in-progress: false

jobs:
  gate:
    name: Validate (release gate)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Install every pinned tool
        shell: bash
        env:
          SECURITY: 'true'
          LINT: 'true'
          ENABLE_SAST: 'true'
          DET_PYTHON: 'true'
          DET_GO: 'true'
          DET_JS: 'true'
          DET_IAC: 'true'
          DET_DOCKERFILE: 'true'
          DET_SHELL: 'true'
          DET_WORKFLOWS: 'true'
          DET_KUSTOMIZE: 'true'
        run: bash scripts/ci-install-tools.sh
      - name: Tool smoke test
        shell: bash
        run: bash scripts/ci-tool-smoke.sh
      - name: Strict self-scan
        uses: ./
        with:
          checkout: false
          strict: true
          security_fail: true
          lint_fail: true
          enable_sarif_upload: false

  release:
    name: Release + Marketplace
    needs: gate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0 # v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Move floating major tag
        if: steps.release.outputs.released == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          major="v${VERSION%%.*}"
          target="$(git rev-list -n 1 "$TAG")"
          git tag -f "$major" "$target"
          git push -f origin "refs/tags/$major"
          echo "Moved $major -> $TAG ($target)"
