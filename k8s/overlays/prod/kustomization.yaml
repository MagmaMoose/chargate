apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: chargate
resources:
  - ../../base
images:
  # Flux's ImagePolicy (defined in the infra repo) rewrites newTag to the latest
  # released image. The placeholder is replaced on the first reconcile after a
  # release publishes ghcr.io/magmamoose/chargate:<version>.
  - name: ghcr.io/magmamoose/chargate
    newTag: v2.5.1 # {"$imagepolicy": "flux-system:chargate:tag"}
