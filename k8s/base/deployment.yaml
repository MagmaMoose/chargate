# Chargate/KICS suppressions (reviewed false positives, not vulnerabilities):
#   611ab018... `metadata.namespace is undefined` — kustomize base; the namespace
#     is set by the overlay (k8s/overlays/prod/kustomization.yaml: `namespace: chargate`).
#   02323c00... runAsUser low UID — intentional: matches the image's `app` user
#     (uid 1000). Running as a higher UID would mismatch the image filesystem.
#   7c81d34c... / 583053b7... image lacks digest / tag is `latest` — placeholder
#     for Flux ImagePolicy, which rewrites the tag (and pins to the released
#     `vX.Y.Z`) on reconcile. See the overlay's `images:` block.
#   4a20ebac... / 48a5beba... no LimitRange / ResourceQuota — those are cluster-
#     namespace policies, not Deployment-level fields. Out of scope here.
#   3d658f8b... envFrom.secretRef is defined — this is the correct pattern: the
#     Secret is created by an ExternalSecret synced from OCI Vault (see
#     externalsecret.yaml). Inlining the values would be the actual vulnerability.
# kics-scan disable=611ab018-c4aa-4ba2-b0f6-a448337509a6,02323c00-cdc3-4fdc-a310-4f2b3e7a1660,7c81d34c-8e5a-402b-9798-9f442630e678,583053b7-e632-46f0-b989-f81ff8045385,4a20ebac-1060-4c81-95d1-1f7f620e983b,48a5beba-e4c0-4584-a2aa-e6894e4cf424,3d658f8b-d988-41a0-a841-40043121de1e
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chargate
  labels:
    app: chargate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chargate
  template:
    metadata:
      labels:
        app: chargate
      annotations:
        # AppArmor: confine the broker with the host's default runtime profile
        # (matches the seccompProfile RuntimeDefault below).
        container.apparmor.security.beta.kubernetes.io/chargate: runtime/default
    spec:
      # The broker never calls the k8s API — disable SA token mount.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        # Numeric UID/GID so the kubelet can verify non-root (the image's `app`
        # user is uid/gid 1000; a name alone fails the non-root check).
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        # The token broker (FastAPI). Verifies a consumer's GitHub Actions OIDC
        # token and mints a repo-scoped Chargate App installation token so the
        # PR comment is authored by Chargate[bot].
        - name: chargate
          image: ghcr.io/magmamoose/chargate:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          # APP_ID / PRIVATE_KEY come from OCI Vault via the ExternalSecret.
          envFrom:
            - secretRef:
                name: chargate-broker
          env:
            # Must match the `oidc_audience` the consumer action requests.
            - name: OIDC_AUDIENCE
              value: "chargate"
            - name: GITHUB_API_URL
              value: "https://api.github.com"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
