# Chargate/KICS suppressions (reviewed false positives, not vulnerabilities):
#   3e2d3b2f... Passwords And Secrets - Generic Secret misfires on `PRIVATE_KEY`
#   below: that's the *target* secretKey name an ExternalSecret writes the value
#   into; the value is fetched from OCI Vault at sync time, never present here.
#   611ab018... `metadata.namespace is undefined` — kustomize base; the namespace
#   is set by the overlay (k8s/overlays/prod/kustomization.yaml: `namespace: chargate`).
# kics-scan disable=3e2d3b2f-c22a-4df1-9cc6-a7a0aebb0c99,611ab018-c4aa-4ba2-b0f6-a448337509a6
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chargate-broker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: chargate-broker
    creationPolicy: Owner
    template:
      type: Opaque
  # Produces a Secret named `chargate-broker` carrying the Chargate GitHub App
  # credentials the broker reads via pydantic-settings (consumed with envFrom).
  # OIDC_AUDIENCE / GITHUB_API_URL are NOT secret and are set as literal env in
  # the Deployment.
  #   APP_ID      — the Chargate App's numeric App ID  (vault: chargate-github-app-id)
  #   PRIVATE_KEY — the App's RSA private key PEM       (vault: chargate-github-private-key)
  data:
    - secretKey: APP_ID
      remoteRef:
        key: chargate-github-app-id
    - secretKey: PRIVATE_KEY
      remoteRef:
        key: chargate-github-private-key
