apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: chargate-broker
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: chargate-broker
    creationPolicy: Owner
    template:
      type: Opaque
  # Produces a Secret named `chargate-broker` carrying the Chargate GitHub App
  # credentials the broker reads via pydantic-settings (consumed with envFrom).
  # OIDC_AUDIENCE / GITHUB_API_URL are NOT secret and are set as literal env in
  # the Deployment.
  #   APP_ID      — the Chargate App's numeric App ID  (vault: chargate-github-app-id)
  #   PRIVATE_KEY — the App's RSA private key PEM       (vault: chargate-github-private-key)
  data:
    - secretKey: APP_ID
      remoteRef:
        key: chargate-github-app-id
    - secretKey: PRIVATE_KEY
      remoteRef:
        key: chargate-github-private-key
