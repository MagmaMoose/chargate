# Mirror `ghcr-pull-secret` from the `flux-system` namespace into `chargate`
# using external-secrets' Kubernetes provider (same pattern as caldrith). The
# flux-system Secret is the SOPS-managed token that pulls ghcr.io/magmamoose/*.
# Cross-namespace RBAC (a Role/RoleBinding in flux-system that lets the
# `chargate-ghcr-reader` ServiceAccount read the Secret) lives in the infra repo.
#
# Chargate/KICS suppression (reviewed false positive, not a vulnerability):
#   611ab018... `metadata.namespace is undefined` — kustomize base; the namespace
#   is set by the overlay (k8s/overlays/prod/kustomization.yaml: `namespace: chargate`).
# kics-scan disable=611ab018-c4aa-4ba2-b0f6-a448337509a6
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: chargate-ghcr-reader

---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: ghcr-pull-secret-mirror
spec:
  provider:
    kubernetes:
      remoteNamespace: flux-system
      server:
        caProvider:
          type: ConfigMap
          name: kube-root-ca.crt
          namespace: chargate
          key: ca.crt
      auth:
        serviceAccount:
          name: chargate-ghcr-reader

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ghcr-pull-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: ghcr-pull-secret-mirror
    kind: SecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    # The source is a kubernetes.io/dockerconfigjson Secret with one key
    # `.dockerconfigjson`. Re-emit the same shape so kubelet recognises it as an
    # image-pull credential.
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: "{{ index . `.dockerconfigjson` }}"
  dataFrom:
    - extract:
        key: ghcr-pull-secret
