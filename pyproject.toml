# Chargate is a composite action (no Python package). This file only configures
# python-semantic-release, which versions the action and cuts GitHub Releases
# (those update the Marketplace listing). Mirrors the diatreme setup.
[tool.semantic_release]
version_variables = ["pyproject.toml:tool.semantic_release.version"]
build_command = ""
major_on_zero = false
tag_format = "v{version}"

# Maintained by semantic-release — do not edit manually.
version = "1.0.2"

[tool.semantic_release.branches.main]
match = "(main|master)"
prerelease = false

[tool.semantic_release.changelog]
changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "docs", "style", "refactor", "perf", "test", "build", "ci", "chore", "revert"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
type = "github"
