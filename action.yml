name: 'Cinnabar'
description: 'Security + lint gate: Trivy, TruffleHog, Semgrep, dep audits, Checkov, ESLint, Kustomize, Hadolint, ShellCheck, actionlint — dynamic language detection, one action.'
author: 'Caleb Sargeant'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  # ── General ────────────────────────────────────────────────────────────────
  checkout:
    description: 'Run actions/checkout (fetch-depth 0) first. Set false if the caller already checked out the code.'
    required: false
    default: 'true'
  security:
    description: 'Run the security scanners.'
    required: false
    default: 'true'
  lint:
    description: 'Run the lint checks.'
    required: false
    default: 'true'
  security_fail:
    description: 'Fail the job on security findings (fail closed). Set false to report only.'
    required: false
    default: 'true'
  lint_fail:
    description: 'Fail the job on lint findings. Default false = advisory.'
    required: false
    default: 'false'
  enable_sarif_upload:
    description: 'Upload SARIF to the GitHub Security tab (needs GitHub Advanced Security on private repos).'
    required: false
    default: 'true'
  github_token:
    description: 'Token used for SARIF upload / API access.'
    required: false
    default: ${{ github.token }}

  # ── Trivy (vulnerabilities) ──────────────────────────────────────────────────
  trivy_severity:
    description: 'Trivy severities to flag.'
    required: false
    default: 'CRITICAL,HIGH'
  trivy_ignore_unfixed:
    description: 'Ignore vulnerabilities with no fix available.'
    required: false
    default: 'true'
  trivy_version:
    description: 'Trivy CLI version to install.'
    required: false
    default: 'v0.69.3'
  trivyignore_file:
    description: 'Path to a .trivyignore file (used only if it exists).'
    required: false
    default: '.trivyignore'

  # ── Secrets / SAST ───────────────────────────────────────────────────────────
  trufflehog_exclude:
    description: 'Path to a TruffleHog exclude-paths file (used only if it exists).'
    required: false
    default: ''
  trufflehog_version:
    description: 'TruffleHog version to install (blank = latest).'
    required: false
    default: ''
  enable_sast:
    description: 'Run Semgrep SAST.'
    required: false
    default: 'true'
  semgrep_config:
    description: 'Space-separated Semgrep rulesets.'
    required: false
    default: 'p/default p/security-audit p/secrets'
  semgrep_baseline:
    description: 'Path to a Semgrep ignore file; if blank, .semgrepignore is auto-detected.'
    required: false
    default: ''
  semgrep_version:
    description: 'Semgrep version to install.'
    required: false
    default: '1.151.0'

  # ── Dependency audits ────────────────────────────────────────────────────────
  npm_audit_level:
    description: 'Minimum severity for npm/yarn/pnpm audit.'
    required: false
    default: 'high'

  # ── IaC ──────────────────────────────────────────────────────────────────────
  checkov_skip_checks:
    description: 'Comma-separated Checkov check IDs to skip.'
    required: false
    default: ''

  # ── Licenses (opt-in) ─────────────────────────────────────────────────────────
  enable_license_scan:
    description: 'Run the Trivy license-compliance scan.'
    required: false
    default: 'false'

  # ── Lint ───────────────────────────────────────────────────────────────────────
  eslint_script:
    description: 'npm script to run for ESLint.'
    required: false
    default: 'lint'
  k8s_directory:
    description: 'Directory containing Kustomize files.'
    required: false
    default: './k8s'
  kustomize_version:
    description: 'Kustomize version to install.'
    required: false
    default: '5.8.1'
  kubernetes_version:
    description: 'Kubernetes version for manifest validation.'
    required: false
    default: '1.32.0'
  skip_kubeconform:
    description: 'Skip kubeconform validation.'
    required: false
    default: 'false'
  skip_kubescore:
    description: 'Skip kube-score (advisory) validation.'
    required: false
    default: 'false'
  hadolint_version:
    description: 'hadolint version to install.'
    required: false
    default: '2.12.0'
  actionlint_version:
    description: 'actionlint version to install.'
    required: false
    default: '1.7.7'

outputs:
  scan_skipped:
    description: 'true when no relevant files changed and the scan was skipped.'
    value: ${{ steps.report.outputs.scan_skipped }}
  security_result:
    description: 'pass | findings | error | disabled | skipped'
    value: ${{ steps.report.outputs.security_result }}
  lint_result:
    description: 'pass | findings | error | disabled | skipped'
    value: ${{ steps.report.outputs.lint_result }}

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      with:
        fetch-depth: 0

    - name: Detect changed files
      id: detect
      uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
      with:
        filters: |
          any_changed:
            - '**/*'
          python:
            - '**/*.py'
            - 'requirements*.txt'
            - 'requirements/**'
            - 'pyproject.toml'
            - 'poetry.lock'
            - 'Pipfile'
            - 'Pipfile.lock'
            - 'setup.py'
            - 'setup.cfg'
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'
          javascript:
            - '**/*.js'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.tsx'
            - '**/*.mjs'
            - '**/*.cjs'
            - 'package.json'
            - 'package-lock.json'
            - 'yarn.lock'
            - 'pnpm-lock.yaml'
            - 'eslint.config.*'
            - '.eslintrc*'
          iac:
            - '**/*.tf'
            - '**/*.tfvars'
            - '**/*.hcl'
            - '**/k8s/**'
            - '**/kubernetes/**'
            - '**/kustomize/**'
            - '**/helm/**'
            - '**/*.yaml'
            - '**/*.yml'
            - '!.github/workflows/**'
          dockerfile:
            - '**/Dockerfile'
            - '**/Dockerfile.*'
            - '**/*.dockerfile'
            - 'docker-compose*.yml'
            - 'docker-compose*.yaml'
          shell:
            - '**/*.sh'
            - '**/*.bash'
            - '**/*.zsh'
          workflows:
            - '.github/workflows/**'
          kustomize:
            - '**/k8s/**'
            - '**/kubernetes/**'
            - '**/kustomize/**'
            - '**/kustomization.yaml'
            - '**/kustomization.yml'

    - name: Cinnabar setup
      if: ${{ steps.detect.outputs.any_changed == 'true' }}
      shell: bash
      run: |
        echo "## 🔴 Cinnabar — detected changes" >> "$GITHUB_STEP_SUMMARY"
        {
          echo ""
          echo "| Type | Changed |"
          echo "|------|---------|"
          echo "| Python | ${{ steps.detect.outputs.python }} |"
          echo "| Go | ${{ steps.detect.outputs.go }} |"
          echo "| JavaScript/TypeScript | ${{ steps.detect.outputs.javascript }} |"
          echo "| IaC | ${{ steps.detect.outputs.iac }} |"
          echo "| Dockerfile | ${{ steps.detect.outputs.dockerfile }} |"
          echo "| Shell | ${{ steps.detect.outputs.shell }} |"
          echo "| Workflows | ${{ steps.detect.outputs.workflows }} |"
          echo "| Kustomize | ${{ steps.detect.outputs.kustomize }} |"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
        if [ "${{ inputs.enable_sarif_upload }}" = "true" ]; then
          d="$RUNNER_TEMP/cinnabar-sarif"; mkdir -p "$d"
          echo "CINNABAR_SARIF_DIR=$d" >> "$GITHUB_ENV"
        fi

    - name: Install tools
      if: ${{ steps.detect.outputs.any_changed == 'true' }}
      shell: bash
      env:
        SECURITY: ${{ inputs.security }}
        LINT: ${{ inputs.lint }}
        ENABLE_SAST: ${{ inputs.enable_sast }}
        DET_PYTHON: ${{ steps.detect.outputs.python }}
        DET_GO: ${{ steps.detect.outputs.go }}
        DET_JS: ${{ steps.detect.outputs.javascript }}
        DET_IAC: ${{ steps.detect.outputs.iac }}
        DET_DOCKERFILE: ${{ steps.detect.outputs.dockerfile }}
        DET_SHELL: ${{ steps.detect.outputs.shell }}
        DET_WORKFLOWS: ${{ steps.detect.outputs.workflows }}
        DET_KUSTOMIZE: ${{ steps.detect.outputs.kustomize }}
        ESLINT_SCRIPT: ${{ inputs.eslint_script }}
        TRIVY_VERSION: ${{ inputs.trivy_version }}
        TRUFFLEHOG_VERSION: ${{ inputs.trufflehog_version }}
        SEMGREP_VERSION: ${{ inputs.semgrep_version }}
        HADOLINT_VERSION: ${{ inputs.hadolint_version }}
        ACTIONLINT_VERSION: ${{ inputs.actionlint_version }}
        KUSTOMIZE_VERSION: ${{ inputs.kustomize_version }}
      run: bash "$GITHUB_ACTION_PATH/scripts/ci-install-tools.sh"

    # ── Security ──────────────────────────────────────────────────────────────
    - name: 'Security · Trivy vulnerabilities'
      id: sec_trivy
      if: ${{ inputs.security == 'true' && steps.detect.outputs.any_changed == 'true' }}
      shell: bash
      env:
        TRIVY_SEVERITY: ${{ inputs.trivy_severity }}
        TRIVY_EXIT_CODE: ${{ inputs.security_fail == 'true' && '1' || '0' }}
        TRIVY_IGNORE_UNFIXED: ${{ inputs.trivy_ignore_unfixed }}
        TRIVY_IGNOREFILE: ${{ inputs.trivyignore_file }}
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-trivy-vuln.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · TruffleHog secrets'
      id: sec_trufflehog
      if: ${{ inputs.security == 'true' && steps.detect.outputs.any_changed == 'true' }}
      shell: bash
      env:
        TRUFFLEHOG_EXCLUDE: ${{ inputs.trufflehog_exclude }}
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-trufflehog.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · Semgrep SAST'
      id: sec_semgrep
      if: ${{ inputs.security == 'true' && inputs.enable_sast == 'true' && steps.detect.outputs.any_changed == 'true' }}
      shell: bash
      env:
        SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
        SEMGREP_BASELINE: ${{ inputs.semgrep_baseline }}
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-semgrep.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · pip-audit (Python)'
      id: sec_pip_audit
      if: ${{ inputs.security == 'true' && steps.detect.outputs.python == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-pip-audit.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · npm/yarn/pnpm audit (JS)'
      id: sec_npm_audit
      if: ${{ inputs.security == 'true' && steps.detect.outputs.javascript == 'true' }}
      shell: bash
      env:
        NPM_AUDIT_LEVEL: ${{ inputs.npm_audit_level }}
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-npm-audit.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · govulncheck (Go)'
      id: sec_govulncheck
      if: ${{ inputs.security == 'true' && steps.detect.outputs.go == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-govulncheck.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · Checkov (IaC)'
      id: sec_checkov
      if: ${{ inputs.security == 'true' && steps.detect.outputs.iac == 'true' }}
      shell: bash
      env:
        CHECKOV_SKIP_CHECKS: ${{ inputs.checkov_skip_checks }}
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-checkov.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · Trivy licenses'
      id: sec_trivy_license
      if: ${{ inputs.security == 'true' && inputs.enable_license_scan == 'true' && steps.detect.outputs.any_changed == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/security-trivy-license.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    # ── Lint ──────────────────────────────────────────────────────────────────
    - name: 'Lint · ESLint (JS)'
      id: lint_eslint
      if: ${{ inputs.lint == 'true' && steps.detect.outputs.javascript == 'true' }}
      shell: bash
      env:
        ESLINT_SCRIPT: ${{ inputs.eslint_script }}
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/lint-eslint.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · Kustomize'
      id: lint_kustomize
      if: ${{ inputs.lint == 'true' && steps.detect.outputs.kustomize == 'true' }}
      shell: bash
      env:
        K8S_DIRECTORY: ${{ inputs.k8s_directory }}
        KUBERNETES_VERSION: ${{ inputs.kubernetes_version }}
        SKIP_KUBECONFORM: ${{ inputs.skip_kubeconform }}
        SKIP_KUBESCORE: ${{ inputs.skip_kubescore }}
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/lint-kustomize.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · Hadolint (Dockerfile)'
      id: lint_hadolint
      if: ${{ inputs.lint == 'true' && steps.detect.outputs.dockerfile == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/lint-hadolint.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · ShellCheck'
      id: lint_shellcheck
      if: ${{ inputs.lint == 'true' && steps.detect.outputs.shell == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/lint-shellcheck.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · actionlint'
      id: lint_actionlint
      if: ${{ inputs.lint == 'true' && steps.detect.outputs.workflows == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$GITHUB_ACTION_PATH/scripts/lint-actionlint.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    # ── SARIF upload ──────────────────────────────────────────────────────────
    - name: Upload SARIF
      if: ${{ always() && inputs.enable_sarif_upload == 'true' && steps.detect.outputs.any_changed == 'true' && env.CINNABAR_SARIF_DIR != '' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@f5c2471be782132e47a6e6f9c725e56730d6e9a3 # v3.32.3
      with:
        sarif_file: ${{ env.CINNABAR_SARIF_DIR }}
        token: ${{ inputs.github_token }}

    # ── Report + gate ─────────────────────────────────────────────────────────
    - name: Report
      id: report
      if: ${{ always() }}
      shell: bash
      env:
        DET_ANY: ${{ steps.detect.outputs.any_changed }}
        SECURITY: ${{ inputs.security }}
        LINT: ${{ inputs.lint }}
        SECURITY_FAIL: ${{ inputs.security_fail }}
        LINT_FAIL: ${{ inputs.lint_fail }}
        TRIVY_SEVERITY: ${{ inputs.trivy_severity }}
        SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
        ESLINT_SCRIPT: ${{ inputs.eslint_script }}
        RC_TRIVY: ${{ steps.sec_trivy.outputs.rc }}
        RC_TRUFFLEHOG: ${{ steps.sec_trufflehog.outputs.rc }}
        RC_SEMGREP: ${{ steps.sec_semgrep.outputs.rc }}
        RC_PIP_AUDIT: ${{ steps.sec_pip_audit.outputs.rc }}
        RC_NPM_AUDIT: ${{ steps.sec_npm_audit.outputs.rc }}
        RC_GOVULNCHECK: ${{ steps.sec_govulncheck.outputs.rc }}
        RC_CHECKOV: ${{ steps.sec_checkov.outputs.rc }}
        RC_TRIVY_LICENSE: ${{ steps.sec_trivy_license.outputs.rc }}
        RC_ESLINT: ${{ steps.lint_eslint.outputs.rc }}
        RC_KUSTOMIZE: ${{ steps.lint_kustomize.outputs.rc }}
        RC_HADOLINT: ${{ steps.lint_hadolint.outputs.rc }}
        RC_SHELLCHECK: ${{ steps.lint_shellcheck.outputs.rc }}
        RC_ACTIONLINT: ${{ steps.lint_actionlint.outputs.rc }}
      run: bash "$GITHUB_ACTION_PATH/scripts/ci-report.sh"

    - name: Gate
      if: ${{ always() && steps.detect.outputs.any_changed == 'true' }}
      shell: bash
      env:
        SEC_BLOCK: ${{ steps.report.outputs.security_blocking }}
        LINT_BLOCK: ${{ steps.report.outputs.lint_blocking }}
        SEC_RESULT: ${{ steps.report.outputs.security_result }}
        LINT_RESULT: ${{ steps.report.outputs.lint_result }}
      run: |
        set +e
        fail=0
        if [ "${SEC_BLOCK:-false}" = "true" ]; then
          echo "::error title=Cinnabar::Security scan found blocking issues (security_result=$SEC_RESULT)"
          fail=1
        fi
        if [ "${LINT_BLOCK:-false}" = "true" ]; then
          echo "::error title=Cinnabar::Lint scan found blocking issues (lint_result=$LINT_RESULT)"
          fail=1
        fi
        if [ "$fail" = "1" ]; then exit 1; fi
        echo "Cinnabar: no blocking findings (security=$SEC_RESULT, lint=$LINT_RESULT)"
