name: 'Chargate'
description: 'Security + lint gate: Trivy, Semgrep, Checkov, ShellCheck & more, with dynamic language detection.'
author: 'Caleb Sargeant'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  # ── General ────────────────────────────────────────────────────────────────
  checkout:
    description: 'Run actions/checkout (fetch-depth 0) first. Set false if the caller already checked out the code.'
    required: false
    default: 'true'
  security:
    description: 'Run the security scanners.'
    required: false
    default: 'true'
  lint:
    description: 'Run the lint checks.'
    required: false
    default: 'true'
  security_fail:
    description: 'Fail the job on security findings (fail closed). Set false to report only.'
    required: false
    default: 'true'
  lint_fail:
    description: 'Fail the job on lint findings. Default false = advisory.'
    required: false
    default: 'false'
  strict:
    description: 'Treat a tool that could not run (a tool error) as a failure. Used by the release gate to catch breaking upstream tool changes.'
    required: false
    default: 'false'
  enable_sarif_upload:
    description: 'Upload SARIF to the GitHub Security tab (needs GitHub Advanced Security on private repos).'
    required: false
    default: 'true'
  github_token:
    description: 'Token used for SARIF upload / API access.'
    required: false
    default: ${{ github.token }}

  # ── Trivy (vulnerabilities) ──────────────────────────────────────────────────
  trivy_severity:
    description: 'Trivy severities to flag.'
    required: false
    default: 'CRITICAL,HIGH'
  trivy_ignore_unfixed:
    description: 'Ignore vulnerabilities with no fix available.'
    required: false
    default: 'true'
  trivyignore_file:
    description: 'Path to a .trivyignore file (used only if it exists).'
    required: false
    default: '.trivyignore'

  # ── Secrets / SAST ───────────────────────────────────────────────────────────
  trufflehog_exclude:
    description: 'Path to a TruffleHog exclude-paths file (used only if it exists).'
    required: false
    default: ''
  enable_sast:
    description: 'Run Semgrep SAST.'
    required: false
    default: 'true'
  semgrep_config:
    description: 'Space-separated Semgrep rulesets.'
    required: false
    default: 'p/default p/security-audit p/secrets'
  semgrep_baseline:
    description: 'Path to a Semgrep ignore file; if blank, .semgrepignore is auto-detected.'
    required: false
    default: ''

  # ── Dependency audits ────────────────────────────────────────────────────────
  npm_audit_level:
    description: 'Minimum severity for npm/yarn/pnpm audit.'
    required: false
    default: 'high'

  # ── IaC ──────────────────────────────────────────────────────────────────────
  checkov_skip_checks:
    description: 'Comma-separated Checkov check IDs to skip.'
    required: false
    default: ''

  # ── Licenses (opt-in) ─────────────────────────────────────────────────────────
  enable_license_scan:
    description: 'Run the Trivy license-compliance scan.'
    required: false
    default: 'false'

  # ── Lint ───────────────────────────────────────────────────────────────────────
  eslint_script:
    description: 'npm script to run for ESLint.'
    required: false
    default: 'lint'
  k8s_directory:
    description: 'Directory containing Kustomize files.'
    required: false
    default: './k8s'
  kubernetes_version:
    description: 'Kubernetes version for manifest validation.'
    required: false
    default: '1.32.0'
  skip_kubeconform:
    description: 'Skip kubeconform validation.'
    required: false
    default: 'false'
  skip_kubescore:
    description: 'Skip kube-score (advisory) validation.'
    required: false
    default: 'false'

outputs:
  scan_skipped:
    description: 'true when no relevant files changed and the scan was skipped.'
    value: ${{ steps.report.outputs.scan_skipped }}
  security_result:
    description: 'pass | findings | error | disabled | skipped'
    value: ${{ steps.report.outputs.security_result }}
  lint_result:
    description: 'pass | findings | error | disabled | skipped'
    value: ${{ steps.report.outputs.lint_result }}

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: 0

    - name: Detect changed files
      id: detect
      continue-on-error: true
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      with:
        filters: |
          any_changed:
            - '**/*'
          python:
            - '**/*.py'
            - 'requirements*.txt'
            - 'requirements/**'
            - 'pyproject.toml'
            - 'poetry.lock'
            - 'Pipfile'
            - 'Pipfile.lock'
            - 'setup.py'
            - 'setup.cfg'
          go:
            - '**/*.go'
            - 'go.mod'
            - 'go.sum'
          javascript:
            - '**/*.js'
            - '**/*.jsx'
            - '**/*.ts'
            - '**/*.tsx'
            - '**/*.mjs'
            - '**/*.cjs'
            - 'package.json'
            - 'package-lock.json'
            - 'yarn.lock'
            - 'pnpm-lock.yaml'
            - 'eslint.config.*'
            - '.eslintrc*'
          iac:
            - '**/*.tf'
            - '**/*.tfvars'
            - '**/*.hcl'
            - '**/k8s/**'
            - '**/kubernetes/**'
            - '**/kustomize/**'
            - '**/helm/**'
            - '**/*.yaml'
            - '**/*.yml'
            - '!.github/workflows/**'
          dockerfile:
            - '**/Dockerfile'
            - '**/Dockerfile.*'
            - '**/*.dockerfile'
            - 'docker-compose*.yml'
            - 'docker-compose*.yaml'
          shell:
            - '**/*.sh'
            - '**/*.bash'
            - '**/*.zsh'
          workflows:
            - '.github/workflows/**'
          kustomize:
            - '**/k8s/**'
            - '**/kubernetes/**'
            - '**/kustomize/**'
            - '**/kustomization.yaml'
            - '**/kustomization.yml'

    - name: Resolve scan scope
      id: scope
      shell: bash
      env:
        DETECT_OK: ${{ steps.detect.outcome }}
        D_ANY: ${{ steps.detect.outputs.any_changed }}
        D_PY: ${{ steps.detect.outputs.python }}
        D_GO: ${{ steps.detect.outputs.go }}
        D_JS: ${{ steps.detect.outputs.javascript }}
        D_IAC: ${{ steps.detect.outputs.iac }}
        D_DOCKER: ${{ steps.detect.outputs.dockerfile }}
        D_SHELL: ${{ steps.detect.outputs.shell }}
        D_WF: ${{ steps.detect.outputs.workflows }}
        D_KUST: ${{ steps.detect.outputs.kustomize }}
      run: |
        o() { echo "$1=$2" >> "$GITHUB_OUTPUT"; }
        if [ "$DETECT_OK" != "success" ]; then
          echo "::warning title=Chargate::change detection unavailable — scanning everything (fail-safe)"
          for k in any_changed python go javascript iac dockerfile shell workflows kustomize; do o "$k" true; done
        else
          o any_changed "${D_ANY:-false}"; o python "${D_PY:-false}"; o go "${D_GO:-false}"
          o javascript "${D_JS:-false}"; o iac "${D_IAC:-false}"; o dockerfile "${D_DOCKER:-false}"
          o shell "${D_SHELL:-false}"; o workflows "${D_WF:-false}"; o kustomize "${D_KUST:-false}"
        fi

    - name: Fetch Chargate runtime
      id: runtime
      shell: bash
      env:
        CHARGATE_PLATFORM_SHA: 0acafb2cb991d84e772be412a60c08b7dda3a44e
        CHARGATE_PLATFORM_ARCHIVE: https://codeload.github.com/MagmaMoose/platform/tar.gz/0acafb2cb991d84e772be412a60c08b7dda3a44e
      run: |
        set -euo pipefail
        base="${RUNNER_TEMP:-/tmp}/chargate-platform"
        runtime="${RUNNER_TEMP:-/tmp}/chargate-runtime"
        rm -rf "$base" "$runtime"
        mkdir -p "$base" "$runtime"

        curl -fsSL --retry 3 --retry-delay 2 "$CHARGATE_PLATFORM_ARCHIVE" -o "$base/platform.tgz"
        tar -xzf "$base/platform.tgz" -C "$base"

        src="$(find "$base" -type d -path '*/apps/chargate' -print -quit)"
        if [ -z "$src" ] || [ ! -d "$src/scripts" ]; then
          echo "::error title=Chargate::platform runtime not found in pinned archive"
          exit 1
        fi

        cp -R "$src"/. "$runtime"/
        find "$runtime/scripts" -type f \( -name '*.sh' -o -name '*.py' \) -exec chmod +x {} +
        echo "CHARGATE_RUNTIME=$runtime" >> "$GITHUB_ENV"
        echo "runtime=$runtime" >> "$GITHUB_OUTPUT"
        echo "platform_sha=$CHARGATE_PLATFORM_SHA" >> "$GITHUB_OUTPUT"

    - name: Chargate setup
      if: ${{ steps.scope.outputs.any_changed == 'true' }}
      shell: bash
      run: |
        echo "## 🔴 Chargate — detected changes" >> "$GITHUB_STEP_SUMMARY"
        {
          echo ""
          echo "| Type | Changed |"
          echo "|------|---------|"
          echo "| Python | ${{ steps.scope.outputs.python }} |"
          echo "| Go | ${{ steps.scope.outputs.go }} |"
          echo "| JavaScript/TypeScript | ${{ steps.scope.outputs.javascript }} |"
          echo "| IaC | ${{ steps.scope.outputs.iac }} |"
          echo "| Dockerfile | ${{ steps.scope.outputs.dockerfile }} |"
          echo "| Shell | ${{ steps.scope.outputs.shell }} |"
          echo "| Workflows | ${{ steps.scope.outputs.workflows }} |"
          echo "| Kustomize | ${{ steps.scope.outputs.kustomize }} |"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
        if [ "${{ inputs.enable_sarif_upload }}" = "true" ]; then
          d="$RUNNER_TEMP/chargate-sarif"; mkdir -p "$d"
          echo "CHARGATE_SARIF_DIR=$d" >> "$GITHUB_ENV"
        fi

    - name: Install tools
      if: ${{ steps.scope.outputs.any_changed == 'true' }}
      shell: bash
      env:
        SECURITY: ${{ inputs.security }}
        LINT: ${{ inputs.lint }}
        ENABLE_SAST: ${{ inputs.enable_sast }}
        DET_PYTHON: ${{ steps.scope.outputs.python }}
        DET_GO: ${{ steps.scope.outputs.go }}
        DET_JS: ${{ steps.scope.outputs.javascript }}
        DET_IAC: ${{ steps.scope.outputs.iac }}
        DET_DOCKERFILE: ${{ steps.scope.outputs.dockerfile }}
        DET_SHELL: ${{ steps.scope.outputs.shell }}
        DET_WORKFLOWS: ${{ steps.scope.outputs.workflows }}
        DET_KUSTOMIZE: ${{ steps.scope.outputs.kustomize }}
        ESLINT_SCRIPT: ${{ inputs.eslint_script }}
      run: bash "$CHARGATE_RUNTIME/scripts/ci-install-tools.sh"

    # ── Security ──────────────────────────────────────────────────────────────
    - name: 'Security · Trivy vulnerabilities'
      id: sec_trivy
      if: ${{ inputs.security == 'true' && steps.scope.outputs.any_changed == 'true' }}
      shell: bash
      env:
        TRIVY_SEVERITY: ${{ inputs.trivy_severity }}
        TRIVY_EXIT_CODE: ${{ inputs.security_fail == 'true' && '1' || '0' }}
        TRIVY_IGNORE_UNFIXED: ${{ inputs.trivy_ignore_unfixed }}
        TRIVY_IGNOREFILE: ${{ inputs.trivyignore_file }}
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-trivy-vuln.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · TruffleHog secrets'
      id: sec_trufflehog
      if: ${{ inputs.security == 'true' && steps.scope.outputs.any_changed == 'true' }}
      shell: bash
      env:
        TRUFFLEHOG_EXCLUDE: ${{ inputs.trufflehog_exclude }}
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-trufflehog.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · Semgrep SAST'
      id: sec_semgrep
      if: ${{ inputs.security == 'true' && inputs.enable_sast == 'true' && steps.scope.outputs.any_changed == 'true' }}
      shell: bash
      env:
        SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
        SEMGREP_BASELINE: ${{ inputs.semgrep_baseline }}
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-semgrep.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · pip-audit (Python)'
      id: sec_pip_audit
      if: ${{ inputs.security == 'true' && steps.scope.outputs.python == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-pip-audit.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · npm/yarn/pnpm audit (JS)'
      id: sec_npm_audit
      if: ${{ inputs.security == 'true' && steps.scope.outputs.javascript == 'true' }}
      shell: bash
      env:
        NPM_AUDIT_LEVEL: ${{ inputs.npm_audit_level }}
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-npm-audit.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · govulncheck (Go)'
      id: sec_govulncheck
      if: ${{ inputs.security == 'true' && steps.scope.outputs.go == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-govulncheck.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · Checkov (IaC)'
      id: sec_checkov
      if: ${{ inputs.security == 'true' && steps.scope.outputs.iac == 'true' }}
      shell: bash
      env:
        CHECKOV_SKIP_CHECKS: ${{ inputs.checkov_skip_checks }}
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-checkov.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Security · Trivy licenses'
      id: sec_trivy_license
      if: ${{ inputs.security == 'true' && inputs.enable_license_scan == 'true' && steps.scope.outputs.any_changed == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/security-trivy-license.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    # ── Lint ──────────────────────────────────────────────────────────────────
    - name: 'Lint · ESLint (JS)'
      id: lint_eslint
      if: ${{ inputs.lint == 'true' && steps.scope.outputs.javascript == 'true' }}
      shell: bash
      env:
        ESLINT_SCRIPT: ${{ inputs.eslint_script }}
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/lint-eslint.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · Kustomize'
      id: lint_kustomize
      if: ${{ inputs.lint == 'true' && steps.scope.outputs.kustomize == 'true' }}
      shell: bash
      env:
        K8S_DIRECTORY: ${{ inputs.k8s_directory }}
        KUBERNETES_VERSION: ${{ inputs.kubernetes_version }}
        SKIP_KUBECONFORM: ${{ inputs.skip_kubeconform }}
        SKIP_KUBESCORE: ${{ inputs.skip_kubescore }}
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/lint-kustomize.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · Hadolint (Dockerfile)'
      id: lint_hadolint
      if: ${{ inputs.lint == 'true' && steps.scope.outputs.dockerfile == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/lint-hadolint.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · ShellCheck'
      id: lint_shellcheck
      if: ${{ inputs.lint == 'true' && steps.scope.outputs.shell == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/lint-shellcheck.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    - name: 'Lint · actionlint'
      id: lint_actionlint
      if: ${{ inputs.lint == 'true' && steps.scope.outputs.workflows == 'true' }}
      shell: bash
      run: |
        rc=0; bash "$CHARGATE_RUNTIME/scripts/lint-actionlint.sh" || rc=$?
        echo "rc=$rc" >> "$GITHUB_OUTPUT"

    # ── SARIF upload ──────────────────────────────────────────────────────────
    - name: Upload SARIF
      if: ${{ always() && inputs.enable_sarif_upload == 'true' && steps.scope.outputs.any_changed == 'true' && env.CHARGATE_SARIF_DIR != '' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
      with:
        sarif_file: ${{ env.CHARGATE_SARIF_DIR }}
        token: ${{ inputs.github_token }}

    # ── Report + gate ─────────────────────────────────────────────────────────
    - name: Report
      id: report
      if: ${{ always() }}
      shell: bash
      env:
        DET_ANY: ${{ steps.scope.outputs.any_changed }}
        SECURITY: ${{ inputs.security }}
        LINT: ${{ inputs.lint }}
        SECURITY_FAIL: ${{ inputs.security_fail }}
        LINT_FAIL: ${{ inputs.lint_fail }}
        TRIVY_SEVERITY: ${{ inputs.trivy_severity }}
        SEMGREP_CONFIG: ${{ inputs.semgrep_config }}
        ESLINT_SCRIPT: ${{ inputs.eslint_script }}
        RC_TRIVY: ${{ steps.sec_trivy.outputs.rc }}
        RC_TRUFFLEHOG: ${{ steps.sec_trufflehog.outputs.rc }}
        RC_SEMGREP: ${{ steps.sec_semgrep.outputs.rc }}
        RC_PIP_AUDIT: ${{ steps.sec_pip_audit.outputs.rc }}
        RC_NPM_AUDIT: ${{ steps.sec_npm_audit.outputs.rc }}
        RC_GOVULNCHECK: ${{ steps.sec_govulncheck.outputs.rc }}
        RC_CHECKOV: ${{ steps.sec_checkov.outputs.rc }}
        RC_TRIVY_LICENSE: ${{ steps.sec_trivy_license.outputs.rc }}
        RC_ESLINT: ${{ steps.lint_eslint.outputs.rc }}
        RC_KUSTOMIZE: ${{ steps.lint_kustomize.outputs.rc }}
        RC_HADOLINT: ${{ steps.lint_hadolint.outputs.rc }}
        RC_SHELLCHECK: ${{ steps.lint_shellcheck.outputs.rc }}
        RC_ACTIONLINT: ${{ steps.lint_actionlint.outputs.rc }}
      run: bash "$CHARGATE_RUNTIME/scripts/ci-report.sh"

    - name: Gate
      if: ${{ always() && steps.scope.outputs.any_changed == 'true' }}
      shell: bash
      env:
        SEC_BLOCK: ${{ steps.report.outputs.security_blocking }}
        LINT_BLOCK: ${{ steps.report.outputs.lint_blocking }}
        SEC_RESULT: ${{ steps.report.outputs.security_result }}
        LINT_RESULT: ${{ steps.report.outputs.lint_result }}
        STRICT: ${{ inputs.strict }}
      run: |
        set +e
        fail=0
        if [ "${STRICT:-false}" = "true" ] && { [ "$SEC_RESULT" = "error" ] || [ "$LINT_RESULT" = "error" ]; }; then
          echo "::error title=Chargate::strict mode — a scanner failed to run (security=$SEC_RESULT, lint=$LINT_RESULT)"
          fail=1
        fi
        if [ "${SEC_BLOCK:-false}" = "true" ]; then
          echo "::error title=Chargate::Security scan found blocking issues (security_result=$SEC_RESULT)"
          fail=1
        fi
        if [ "${LINT_BLOCK:-false}" = "true" ]; then
          echo "::error title=Chargate::Lint scan found blocking issues (lint_result=$LINT_RESULT)"
          fail=1
        fi
        if [ "$fail" = "1" ]; then exit 1; fi
        echo "Chargate: no blocking findings (security=$SEC_RESULT, lint=$LINT_RESULT)"
