name: 'Chargate'
description: 'MegaLinter-backed security + lint gate with net-new (PR-diff) finding gating.'
author: 'Caleb Sargeant'
branding:
  icon: 'shield'
  color: 'red'

inputs:
  # ── Checkout ─────────────────────────────────────────────────────────────
  checkout:
    description: 'Run actions/checkout first. Net-new gating needs full history (fetch-depth 0).'
    required: false
    default: 'true'
  fetch_depth:
    description: 'Checkout fetch-depth. MUST be 0 for net-new gating (merge-base).'
    required: false
    default: '0'

  # ── Gate behaviour ───────────────────────────────────────────────────────
  mode:
    description: 'auto | pr (net-new gate) | baseline (full scan, no gate).'
    required: false
    default: 'auto'
  fail_on:
    description: 'Severity that blocks: any | critical | high | medium | low | none.'
    required: false
    default: 'any'
  precision:
    description: 'Net-new precision: line | file.'
    required: false
    default: 'line'
  base_ref:
    description: 'Override the base ref/SHA (default: PR base SHA from the event).'
    required: false
    default: ''
  head_ref:
    description: 'Override the head ref/SHA (default: PR head SHA, else github.sha).'
    required: false
    default: ''
  strict:
    description: 'Fail the job if MegaLinter itself errors (a tool error, not a finding).'
    required: false
    default: 'false'

  # ── MegaLinter ───────────────────────────────────────────────────────────
  flavor:
    description: 'MegaLinter flavor: all (full image) | security | python | go | ...'
    required: false
    default: 'all'
  megalinter_tag:
    description: 'MegaLinter image tag or digest to pin.'
    required: false
    default: 'v8'
  enable_linters:
    description: 'Comma-separated MegaLinter linter keys to enable (others off).'
    required: false
    default: ''
  disable_linters:
    description: 'Comma-separated MegaLinter linter keys to disable.'
    required: false
    default: ''

  # ── SARIF output ─────────────────────────────────────────────────────────
  emit_sarif_artifact:
    description: 'Upload the full SARIF as a build artifact.'
    required: false
    default: 'true'
  sarif_artifact_name:
    description: 'Artifact name for the full SARIF.'
    required: false
    default: 'chargate-sarif'
  upload_github_sarif:
    description: 'Upload the full SARIF to the GitHub Security tab (needs GHAS on private repos).'
    required: false
    default: 'true'
  github_token:
    description: 'Token for the GitHub Security-tab SARIF upload + PR comments. Needs pull-requests: write on the consumer workflow for comments.'
    required: false
    default: ${{ github.token }}

  # ── PR comments (GHAS-style, net-new only) ───────────────────────────────
  pr_comment:
    description: 'Post GHAS-style PR comments for net-new findings (PR events only). Needs pull-requests: write.'
    required: false
    default: 'true'
  pr_comment_mode:
    description: 'What to post: summary (one updatable comment) | inline (per-line) | both.'
    required: false
    default: 'both'
  pr_comment_max_inline:
    description: 'Cap on inline comments per run; the rest are listed in the summary.'
    required: false
    default: '50'
  pr_comment_token:
    description: 'Token used ONLY to author the PR comments. Pass a GitHub App installation token (e.g. from actions/create-github-app-token) to post as your App (Chargate[bot]) instead of github-actions[bot]. Defaults to github_token.'
    required: false
    default: ''

  # ── DefectDojo (optional, first-class) ───────────────────────────────────
  defectdojo_url:
    description: 'DefectDojo base URL. Set to enable import of the FULL SARIF.'
    required: false
    default: ''
  defectdojo_token:
    description: 'DefectDojo API token (pass a secret). Used only if defectdojo_url is set.'
    required: false
    default: ''
  defectdojo_product:
    description: 'DefectDojo product name (auto-created if missing). Defaults to the repo name.'
    required: false
    default: ${{ github.event.repository.name }}
  defectdojo_product_type:
    description: 'DefectDojo product type name (used to auto-create a new product).'
    required: false
    default: 'Research and Development'
  defectdojo_engagement:
    description: 'DefectDojo engagement name (auto-created if missing).'
    required: false
    default: 'ci'
  defectdojo_close_old:
    description: 'Close findings no longer present on reimport.'
    required: false
    default: 'true'

  # ── Dependency-Track (optional, supply-chain BOM sink) ───────────────────
  dependency_track_url:
    description: 'Dependency-Track base URL. Set to enable the CycloneDX BOM upload (pass a Variable).'
    required: false
    default: ''
  dependency_track_api_key:
    description: 'Dependency-Track API key (pass a Secret). Needs BOM_UPLOAD (+ PROJECT_CREATION_UPLOAD for auto-create, + VIEW_PORTFOLIO for the PR-comment project link).'
    required: false
    default: ''
  dependency_track_project_name:
    description: 'Dependency-Track project name (auto-created if missing).'
    required: false
    default: ${{ github.repository }}
  dependency_track_project_version:
    description: 'Dependency-Track project version.'
    required: false
    default: ${{ github.ref_name }}
  dependency_track_auto_create:
    description: 'Auto-create the project/version on first upload.'
    required: false
    default: 'true'

  python_version:
    description: 'Python version used to run the chargate CLI.'
    required: false
    default: '3.12'

outputs:
  mode:
    description: 'Resolved run mode (pr | baseline).'
    value: ${{ steps.chargate.outputs.mode }}
  gate_result:
    description: 'pass | fail.'
    value: ${{ steps.chargate.outputs.gate_result }}
  net_new_count:
    description: 'Number of net-new (PR-introduced) findings.'
    value: ${{ steps.chargate.outputs.net_new_count }}
  total_count:
    description: 'Total findings in the full SARIF (net-new + pre-existing).'
    value: ${{ steps.chargate.outputs.total_count }}
  sarif_path:
    description: 'Path to the full (unfiltered) SARIF report.'
    value: ${{ steps.chargate.outputs.sarif_path }}

runs:
  using: composite
  steps:
    - name: Checkout
      if: ${{ inputs.checkout == 'true' }}
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        fetch-depth: ${{ inputs.fetch_depth }}

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python_version }}

    - name: Install chargate
      shell: bash
      run: python -m pip install --disable-pip-version-check --quiet "$GITHUB_ACTION_PATH"

    # Generate a language-agnostic CycloneDX BOM (Syft) for the Dependency-Track
    # sink. Push/baseline only: PRs don't upload a BOM (no throwaway per-PR
    # versions, faster PR CI), so there's nothing to generate then either.
    - name: Generate CycloneDX SBOM
      if: ${{ inputs.dependency_track_url != '' && github.event_name != 'pull_request' && github.event_name != 'pull_request_target' }}
      uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      with:
        path: '.'
        format: 'cyclonedx-json'
        output-file: ${{ github.workspace }}/chargate-sbom.cdx.json
        artifact-name: chargate-sbom
        upload-artifact: 'true'

    - name: Chargate gate
      id: chargate
      shell: bash
      env:
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_TOKEN: ${{ inputs.pr_comment_token != '' && inputs.pr_comment_token || inputs.github_token }}
        DEFECTDOJO_TOKEN: ${{ inputs.defectdojo_token }}
        DEPENDENCYTRACK_API_KEY: ${{ inputs.dependency_track_api_key }}
        BASE_REF_IN: ${{ inputs.base_ref }}
        HEAD_REF_IN: ${{ inputs.head_ref }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        GH_SHA: ${{ github.sha }}
        DEFAULT_BRANCH_IN: ${{ github.event.repository.default_branch }}
        PR_NUMBER_IN: ${{ github.event.pull_request.number }}
        REPO_SLUG_IN: ${{ github.repository }}
        PR_COMMENT_IN: ${{ inputs.pr_comment }}
        PR_COMMENT_MODE_IN: ${{ inputs.pr_comment_mode }}
        PR_COMMENT_MAX_INLINE_IN: ${{ inputs.pr_comment_max_inline }}
        # All inputs flow through env (never interpolated into the script body)
        # so a malicious value can't break out of the shell — defense-in-depth
        # against `${{ }}` template injection.
        MODE_IN: ${{ inputs.mode }}
        FAIL_ON_IN: ${{ inputs.fail_on }}
        PRECISION_IN: ${{ inputs.precision }}
        STRICT_IN: ${{ inputs.strict }}
        FLAVOR_IN: ${{ inputs.flavor }}
        ML_TAG_IN: ${{ inputs.megalinter_tag }}
        ENABLE_LINTERS_IN: ${{ inputs.enable_linters }}
        DISABLE_LINTERS_IN: ${{ inputs.disable_linters }}
        DD_URL_IN: ${{ inputs.defectdojo_url }}
        DD_PRODUCT_IN: ${{ inputs.defectdojo_product }}
        DD_PRODUCT_TYPE_IN: ${{ inputs.defectdojo_product_type }}
        DD_ENGAGEMENT_IN: ${{ inputs.defectdojo_engagement }}
        DD_CLOSE_OLD_IN: ${{ inputs.defectdojo_close_old }}
        DT_URL_IN: ${{ inputs.dependency_track_url }}
        DT_PROJECT_NAME_IN: ${{ inputs.dependency_track_project_name }}
        DT_PROJECT_VERSION_IN: ${{ inputs.dependency_track_project_version }}
        DT_AUTO_CREATE_IN: ${{ inputs.dependency_track_auto_create }}
      run: |
        set -euo pipefail
        # Keep the SARIF under the workspace so hashFiles() (used to guard the
        # upload steps) can see it; emit a workspace-relative output path.
        sarif_rel="chargate-reports/full.sarif"
        sarif_abs="${GITHUB_WORKSPACE:-$PWD}/$sarif_rel"
        bom_abs="${GITHUB_WORKSPACE:-$PWD}/chargate-sbom.cdx.json"
        mkdir -p "$(dirname "$sarif_abs")"
        echo "sarif_path=$sarif_rel" >> "$GITHUB_OUTPUT"

        base="${BASE_REF_IN:-$PR_BASE_SHA}"
        head="${HEAD_REF_IN:-${PR_HEAD_SHA:-$GH_SHA}}"

        args=(ci
          --mode "$MODE_IN"
          --fail-on "$FAIL_ON_IN"
          --precision "$PRECISION_IN"
          --flavor "$FLAVOR_IN"
          --megalinter-tag "$ML_TAG_IN"
          --repo "."
          --head "$head"
          --sarif-out "$sarif_abs")
        [ -n "$base" ] && args+=(--base "$base")
        [ "$STRICT_IN" = "true" ] && args+=(--strict)

        IFS=',' read -ra _en <<< "$ENABLE_LINTERS_IN"
        for l in "${_en[@]}"; do [ -n "$l" ] && args+=(--enable-linter "$l"); done
        IFS=',' read -ra _di <<< "$DISABLE_LINTERS_IN"
        for l in "${_di[@]}"; do [ -n "$l" ] && args+=(--disable-linter "$l"); done

        if [ -n "$DD_URL_IN" ]; then
          args+=(--defectdojo-url "$DD_URL_IN")
          [ -n "$DD_PRODUCT_IN" ] && args+=(--dd-product "$DD_PRODUCT_IN")
          [ -n "$DD_PRODUCT_TYPE_IN" ] && args+=(--dd-product-type "$DD_PRODUCT_TYPE_IN")
          [ -n "$DD_ENGAGEMENT_IN" ] && args+=(--dd-engagement "$DD_ENGAGEMENT_IN")
          [ "$DD_CLOSE_OLD_IN" != "true" ] && args+=(--dd-no-close-old)
        fi

        if [ -n "$DT_URL_IN" ]; then
          args+=(--dependency-track-url "$DT_URL_IN")
          [ -n "$DT_PROJECT_NAME_IN" ] && args+=(--dt-project-name "$DT_PROJECT_NAME_IN")
          case "$GITHUB_EVENT_NAME" in
            pull_request|pull_request_target)
              # PRs don't upload (no throwaway N/merge versions); just link the
              # comment to the existing default-branch project.
              args+=(--dt-project-version "${DEFAULT_BRANCH_IN:-main}")
              ;;
            *)
              # Push / tags: upload the BOM as a tracked, shipped artifact.
              args+=(--bom "$bom_abs")
              [ -n "$DT_PROJECT_VERSION_IN" ] && args+=(--dt-project-version "$DT_PROJECT_VERSION_IN")
              [ "$DT_AUTO_CREATE_IN" != "true" ] && args+=(--dt-no-auto-create)
              ;;
          esac
        fi

        # GHAS-style PR comments: only on pull_request events, only when we have a
        # PR number (chargate itself no-ops outside PR/gate mode regardless).
        if [ "$PR_COMMENT_IN" = "true" ] && [ -n "$PR_NUMBER_IN" ]; then
          args+=(--pr-comment
            --pr-number "$PR_NUMBER_IN"
            --repo-slug "$REPO_SLUG_IN"
            --pr-comment-mode "$PR_COMMENT_MODE_IN"
            --pr-comment-max-inline "$PR_COMMENT_MAX_INLINE_IN")
        fi

        chargate "${args[@]}"

    # Push/baseline only: on PRs the native code-scanning PR annotations would
    # double-report alongside Chargate's PR comments. The Security tab inventory
    # stays current from the default-branch baseline; PR diffs are owned by the
    # Chargate comments instead.
    - name: Upload SARIF to GitHub Security tab
      if: ${{ always() && inputs.upload_github_sarif == 'true' && github.event_name != 'pull_request' && steps.chargate.outputs.sarif_path != '' && hashFiles(steps.chargate.outputs.sarif_path) != '' }}
      continue-on-error: true
      uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
      with:
        sarif_file: ${{ steps.chargate.outputs.sarif_path }}
        token: ${{ inputs.github_token }}

    - name: Upload SARIF artifact
      if: ${{ always() && inputs.emit_sarif_artifact == 'true' && steps.chargate.outputs.sarif_path != '' && hashFiles(steps.chargate.outputs.sarif_path) != '' }}
      continue-on-error: true
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: ${{ inputs.sarif_artifact_name }}
        path: ${{ steps.chargate.outputs.sarif_path }}
