apiVersion: apps/v1
kind: Deployment
metadata:
  name: chargate-web
  labels: { app: chargate-web }
spec:
  replicas: 2
  selector:
    matchLabels: { app: chargate-web }
  template:
    metadata:
      labels: { app: chargate-web }
    spec:
      containers:
        - name: web
          image: chargate-web   # built with VITE_API_BASE baked to your API origin
          ports: [{ containerPort: 80 }]
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: chargate-web
spec:
  selector: { app: chargate-web }
  ports:
    - port: 80
      targetPort: 80
