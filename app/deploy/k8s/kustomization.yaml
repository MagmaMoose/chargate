# Deploy:  kubectl apply -k app/deploy/k8s
# Edit images + the Secret/Ingress host first. Postgres is assumed external
# (managed) — set CHARGATE_DATABASE_URL in the chargate-secrets Secret.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: chargate
resources:
  - namespace.yaml
  - secret.example.yaml
  - migrate-job.yaml
  - api.yaml
  - web.yaml
  - ingress.yaml
images:
  - name: chargate-api
    newName: ghcr.io/magmamoose/chargate-api
    newTag: latest
  - name: chargate-web
    newName: ghcr.io/magmamoose/chargate-web
    newTag: latest
