# Example only — DO NOT commit real secrets. Create the real one with:
#   kubectl -n chargate create secret generic chargate-secrets --from-env-file=app/api/.env
# or manage it via a sealed-secret / external-secrets operator.
apiVersion: v1
kind: Secret
metadata:
  name: chargate-secrets
type: Opaque
stringData:
  CHARGATE_DATABASE_URL: postgresql+asyncpg://USER:PASS@your-postgres-host:5432/chargate
  CHARGATE_ENVIRONMENT: production
  CHARGATE_GITHUB_APP_ID: "000000"
  CHARGATE_GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    REPLACE
    -----END RSA PRIVATE KEY-----
  CHARGATE_GITHUB_WEBHOOK_SECRET: replace
  CHARGATE_GITHUB_OAUTH_CLIENT_ID: replace
  CHARGATE_GITHUB_OAUTH_CLIENT_SECRET: replace
  CHARGATE_ENGINE_REPO: magmamoose/chargate
  CHARGATE_PUBLIC_BASE_URL: https://chargate.example.com
  CHARGATE_WEB_BASE_URL: https://chargate.example.com
  CHARGATE_CORS_ORIGINS: '["https://chargate.example.com"]'
  CHARGATE_SESSION_SECRET: replace-with-strong-random
  CHARGATE_INGEST_SECRET: replace-with-strong-random
