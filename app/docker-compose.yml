# Full stack for local dev / testing: Postgres + FastAPI backend + React frontend.
#   cp api/.env.example api/.env   # fill in GitHub App + OAuth values
#   docker compose up --build
# UI on http://localhost:8080, API on http://localhost:8000.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chargate
      POSTGRES_PASSWORD: chargate
      POSTGRES_DB: chargate
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chargate"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    env_file: ./api/.env
    environment:
      CHARGATE_DATABASE_URL: postgresql://chargate:chargate@db:5432/chargate
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      args:
        VITE_API_BASE: http://localhost:8000
    ports: ["8080:80"]
    depends_on: [api]

volumes:
  pgdata:
