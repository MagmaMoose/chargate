# Cloudflare Worker config for the Chargate GitHub App webhook receiver.
# Deploy:  npm install && npx wrangler deploy
# Secrets: npx wrangler secret put GITHUB_WEBHOOK_SECRET
#          npx wrangler secret put ENGINE_DISPATCH_TOKEN
name = "chargate-app"
main = "src/index.js"
compatibility_date = "2025-01-01"
workers_dev = true

[vars]
# Repo that hosts .github/workflows/app-scan.yaml (the scan engine).
ENGINE_REPO = "magmamoose/chargate"
# Must match the `types:` entry in app-scan.yaml.
DISPATCH_EVENT_TYPE = "chargate-scan"

# GITHUB_WEBHOOK_SECRET and ENGINE_DISPATCH_TOKEN are secrets, not vars —
# set them with `wrangler secret put`, never commit them.
